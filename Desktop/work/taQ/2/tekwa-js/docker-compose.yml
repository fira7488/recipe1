version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-local-secret-key}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-local-admin-password}
      PORT: 3000
      DB_FILE: ./db.json
      CORS_ORIGIN: http://localhost:3000,http://localhost:5173
      LOG_LEVEL: info
    volumes:
      - ./db.json:/app/db.json
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - tekwa-network

  # Optional: PostgreSQL for future database migration
  # db:
  #   image: postgres:15-alpine
  #   environment:
  #     POSTGRES_DB: tekwa
  #     POSTGRES_USER: tekwa
  #     POSTGRES_PASSWORD: ${DB_PASSWORD}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - tekwa-network

networks:
  tekwa-network:
    driver: bridge

